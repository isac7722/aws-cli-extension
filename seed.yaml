      role: reference
      summary: Go CLI with Cobra + Bubble Tea architecture to replicate for AWS use case
  existing_patterns:
    - Cobra command/subcommand routing
    - Bubble Tea TUI models (SelectorModel, MultiSelectorModel, TextAreaModel)
    - Shell wrapper via eval "$(cmd init shell)" for env var export
    - Lipgloss styling with stderr output
    - INI-based credential file parsing
    - goreleaser + install.sh distribution
  existing_dependencies:
